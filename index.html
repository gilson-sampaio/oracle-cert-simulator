<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4262ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Simulado SQL">
<title>Simulado de Certificação</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- TELA INICIAL -->
  <section id="screen-start" class="screen">
    <div class="card">
      <div class="card-header" id="start-title">Simulado 1Z0-071</div>
      <div class="card-body">
        <div class="setup-row">
          <label for="input-quantity">Quantidade de questões</label>
          <input type="number" id="input-quantity" min="5" max="200" value="63">
        </div>
        <div class="setup-row">
          <label for="input-minutes">Tempo (minutos)</label>
          <input type="number" id="input-minutes" min="5" max="300" value="120">
        </div>
        <p id="bank-info" class="bank-info"></p>
        <p>Este será um formulário cronometrado.</p>
        <p>Depois de iniciar, você não poderá pausar o timer. Suas respostas serão enviadas automaticamente quando o tempo expirar. Prepare-se antes de começar.</p>
        <button id="btn-generate" class="btn secondary">Gerar novo simulado</button>
        <button id="btn-start" class="btn">Clique para iniciar</button>
      </div>
    </div>
  </section>

  <!-- TELA DE QUESTÃO -->
  <section id="screen-quiz" class="screen hidden">
    <header class="quiz-header">
      <div class="progress-wrap">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div class="quiz-header-row">
        <span id="question-counter"></span>
        <span id="quiz-timer" class="quiz-timer">⏱ --:--</span>
      </div>
    </header>

    <div class="card">
      <div id="question-context" class="context-box hidden"></div>
      <div class="card-body">
        <p id="question-text" class="question-text"></p>
        <p id="question-hint" class="hint"></p>
        <div id="options-list" class="options-list"></div>
      </div>
    </div>

    <div class="nav-row">
      <button id="btn-prev" class="btn secondary">Anterior</button>
      <button id="btn-next" class="btn">Próxima</button>
      <button id="btn-finish" class="btn finish hidden">Finalizar</button>
    </div>
  </section>

  <!-- TELA DE RESULTADO -->
  <section id="screen-result" class="screen hidden">
    <div class="card">
      <div class="card-header">Resultado</div>
      <div class="card-body">
        <p id="result-score" class="result-score"></p>
        <p id="result-time"></p>
        <div id="result-review"></div>
        <button id="btn-restart" class="btn">Refazer simulado</button>
      </div>
    </div>
  </section>

</div>

<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
